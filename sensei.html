<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>センセイAI — ペルソナ会話体験デモ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="header">
    <span id="day-count">Day --</span>
    <span class="day-label">2026年3月17日 スタート</span>
    <p class="header-title">Claude Codeで毎日AIを触っています</p>
  </header>

  <div class="story-card" id="story-card">
    <div class="ai-name">🎓 センセイAI</div>
    <span class="ai-type">ペルソナ会話系</span>
    <p class="story-text">セミナーで学んだことをもう一度確認したいDさん。でも何度も質問するのは気が引けて……センセイAIなら、先生の口調でいつでも答えてくれます。</p>
    <button class="start-btn" onclick="engine.start()">▶ 体験してみる</button>
  </div>

  <div id="phone-wrapper" class="phone-wrapper">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="chat-header-bar">🎓 センセイAI</div>
      <div id="chat-screen" class="chat-screen"></div>
    </div>
    <div class="progress-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="engine.next()">次へ ▶</button>
  </div>

  <div class="end-screen" id="end-screen">
    <div class="end-title">🎓 センセイAIはあなたのコミュニティにも作れます</div>
    <p class="end-text">先生の口調でしゃべるAIで、受講生がいつでも復習できる環境を作りませんか？</p>
    <div class="copy-toast" id="copy-toast">📋 コピーされました</div>
    <button class="share-btn" onclick="copyInstagram()">📸 InstagramのURLをコピーする</button>
    <div class="dm-bubble" id="dm-bubble">💬 DMしてね</div>
    <a class="inquiry-btn" href="https://www.instagram.com/nakaneko123/" target="_blank" onclick="showDmBubble(event)">詳しく聞いてみる</a>
  </div>

  <script src="./app.js"></script>
  <script>
    function copyInstagram() {
      navigator.clipboard.writeText('https://www.instagram.com/nakaneko123/');
      const toast = document.getElementById('copy-toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
    function showDmBubble(e) {
      e.preventDefault();
      const bubble = document.getElementById('dm-bubble');
      bubble.classList.add('show');
      setTimeout(() => {
        window.location.href = 'https://www.instagram.com/nakaneko123/';
      }, 1000);
    }
    const engine = new DemoEngine([
      { type: 'user', text: 'RASの法則ってなんでしたっけ？', tip: 'ここをタップしてみて' },
      { type: 'ai',   text: '網様体賦活系のこと。注目したものが見えてくる脳の仕組みだよ' },
      { type: 'user', text: 'どう使えばいい？' },
      { type: 'ai',   text: 'まず"欲しい未来"を言葉にしてみて。脳が勝手に探し始めるから' },
      { type: 'end' }
    ]);
  </script>
</body>
</html>
