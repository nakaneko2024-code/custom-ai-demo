  <meta charset="UTF-8">

  <title>センセイAI — グルコン振り返り体験デモ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="header">
    <span id="day-count">Day --</span>
    <span class="day-label">2026年3月17日 スタート</span>
    <p class="header-title">Claude Codeで毎日AIを触っています</p>
  </header>

  <div class="story-card" id="story-card">
    <div class="ai-name">📋 センセイAI</div>
    <span class="ai-type">グルコン振り返り系</span>
    <div class="pain-box">
      <span class="pain-label">📌 こんなお悩みありませんか？</span>
      <span class="pain-item">「グルコンで言われたことをすぐ忘れてしまう」</span>
      <span class="pain-item">「宿題・アクションを見返す場所がない」</span>
    </div>
    <div class="want-box">
      <span class="want-label">✨ こんな叶えたいがある方に！</span>
      <span class="want-text">グルコン後の振り返りと宿題管理をAIがサポートします</span>
    </div>
    <button class="start-btn" onclick="engine.start()">▶ 体験してみる</button>
  </div>

  <div id="phone-wrapper" class="phone-wrapper">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="chat-header-bar"><span class="ai-avatar-circle">📋</span>センセイAI</div>
      <div id="chat-screen" class="chat-screen"></div>
      <div class="chat-input-area" id="chat-input-area" style="display:none;">
        <div class="chat-input-row">
          <textarea id="chat-input" class="chat-textarea-input" placeholder="なんでも書いて送ってみて" rows="1"></textarea>
          <button class="chat-send-btn" onclick="engine.send()">送信</button>
        </div>
      </div>
    </div>
    <div class="progress-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="end-screen" id="end-screen">
    <div class="end-title">📋 センセイAIはあなたのコミュニティにも作れます</div>
    <p class="end-text">グルコン後の振り返り・宿題管理をAIに任せて、メンバーの行動定着を後押ししませんか？</p>
    <div class="copy-toast" id="copy-toast">📋 コピーされました</div>
    <button class="share-btn" onclick="copyPageUrl()">🔗 このページのURLをコピーする</button>
    <div class="dm-bubble" id="dm-bubble">💬 DMしてね</div>
    <a class="inquiry-btn" href="https://www.instagram.com/nakaneko123/" target="_blank" onclick="showDmBubble(event)">DMして詳しく聞いてみる</a>
  </div>

  <div class="ig-footer">
    <a class="ig-icon-btn" href="https://www.instagram.com/nakaneko123/" target="_blank">

      Instagram
    </a>
  </div>

  <script src="./app.js"></script>
  <script>
    function copyPageUrl() {
      navigator.clipboard.writeText(window.location.href);
      const toast = document.getElementById('copy-toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
    function showDmBubble(e) {
      e.preventDefault();
      const bubble = document.getElementById('dm-bubble');
      bubble.classList.add('show');
      setTimeout(() => {
        window.location.href = 'https://www.instagram.com/nakaneko123/';
      }, 1000);
    }
    const engine = new DemoEngine([
      { type: 'user', chips: ['今日のグルコンのまとめは？', '宿題・アクションを確認したい', '前回の内容を見たい'] },
      { type: 'ai', text: '今日のオーロララボグルコンのまとめはこちら📋\n\nテーマ：プロフィール文の見直し\nポイント：「誰に向けて書くか」を最初に決める', choices: ['宿題も教えて', '議事録を全部見たい', 'ありがとう！'] },
      { type: 'ai', text: '今回の宿題はこちら✏️\n①プロフィール文を書き直して投稿\n②次回グルコンまでにDMで提出\n\n次回は6/19(木)20時です', choices: ['提出方法は？', 'リマインドして', 'わかりました！'] },
      { type: 'end' }
    ]);
  </script>
</body>
</html>
